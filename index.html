<html lang="ja">

<title>Column Writer — AIコラム執筆アシスタント</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:#faf8f5;color:#3d3225;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea{font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:#c8b89a!important}
button:active{transform:scale(0.98)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#d0c8b8;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.loading-spinner{width:32px;height:32px;border:3px solid #e8e4de;border-top-color:#8b7355;border-radius:50%;animation:spin .8s linear infinite}
.loading-text{color:#8a8a8a;margin-top:16px;font-family:'Noto Serif JP',serif;font-size:14px}

.error-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#faf8f5,#f0ede8)}
.error-card{background:#fff;border-radius:16px;padding:48px 40px;width:480px;max-width:90vw;box-shadow:0 4px 24px rgba(0,0,0,.06);text-align:center}
.error-icon{font-size:48px;margin-bottom:16px}
.error-title{font-size:18px;font-weight:700;color:#2d2518;font-family:'Noto Serif JP',serif;margin-bottom:8px}
.error-desc{font-size:13px;color:#8a8070;line-height:1.7}
.error-code{margin-top:16px;padding:12px 16px;background:#fef2f2;border-radius:8px;font-size:12px;color:#b91c1c;font-family:monospace;text-align:left;word-break:break-all}

.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#faf8f5 0%,#f0ede8 50%,#e8e2d8 100%)}
.login-card{background:#fff;border-radius:16px;padding:48px 40px;width:420px;max-width:90vw;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.login-header{text-align:center;margin-bottom:36px}
.logo-mark{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#3d3225,#6b5a42);color:#f0e8d8;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-family:'Noto Serif JP',serif;margin-bottom:16px}
.login-title{font-size:22px;font-weight:700;color:#2d2518;font-family:'Noto Serif JP',serif;margin-bottom:4px}
.login-subtitle{font-size:13px;color:#8a8070}
.login-label{font-size:12px;color:#8a8070;margin-bottom:10px;font-weight:600;letter-spacing:.05em}
.user-btn{display:flex;align-items:center;width:100%;padding:12px 16px;background:0 0;border:1px solid #e8e4de;border-radius:10px;font-size:14px;color:#3d3225;margin-bottom:8px;transition:background .15s}
.user-btn:hover{background:#f0ede8}
.user-btn svg{margin-right:10px;flex-shrink:0}
.new-account-btn{color:#8b7355;font-size:13px;padding:8px 0;font-weight:500}
.login-row{display:flex;gap:8px}
.login-input{flex:1;padding:10px 14px;border:1px solid #e0dcd6;border-radius:8px;font-size:14px;transition:border-color .2s}
.login-submit{padding:10px 24px;background:#3d3225;color:#fff;border-radius:8px;font-size:14px;font-weight:600}
.login-submit:hover{background:#5a4832}
.back-btn-small{color:#8b7355;font-size:13px;margin-top:8px}
.login-error{margin-top:8px;padding:10px 14px;background:#fef2f2;color:#b91c1c;border-radius:8px;font-size:13px}
.login-footer{margin-top:28px;padding-top:20px;border-top:1px solid #f0ede8;text-align:center}
.admin-link{color:#b0a898;font-size:12px;transition:color .15s}
.admin-link:hover{color:#6b5a42}

/* Admin Panel */
.admin-card{background:#fff;border-radius:16px;padding:48px 40px;width:500px;max-width:92vw;box-shadow:0 4px 24px rgba(0,0,0,.06)}
.admin-header{text-align:center;margin-bottom:28px}
.admin-badge{display:inline-block;padding:4px 12px;background:#f5f0e8;color:#6b5a42;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.05em;margin-bottom:12px}
.admin-title{font-size:20px;font-weight:700;color:#2d2518;font-family:'Noto Serif JP',serif}
.admin-section{margin-bottom:24px}
.admin-section-title{font-size:13px;font-weight:600;color:#3d3225;margin-bottom:6px}
.admin-hint{font-size:11px;color:#a09888;margin-bottom:8px;line-height:1.5}
.admin-input{width:100%;padding:10px 14px;border:1px solid #e0dcd6;border-radius:8px;font-size:13px;margin-bottom:4px;transition:border-color .2s}
.admin-input.mono{font-family:'SF Mono',Consolas,monospace;font-size:12px}
.admin-save{width:100%;padding:12px;background:#3d6b35;color:#fff;border-radius:10px;font-size:14px;font-weight:600;margin-top:8px}
.admin-save:hover{background:#4a8040}
.admin-save:disabled{opacity:.45;cursor:not-allowed}
.admin-msg{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px}
.admin-msg.ok{background:#ecfdf5;color:#065f46}
.admin-msg.err{background:#fef2f2;color:#b91c1c}
.admin-status{display:flex;align-items:center;gap:6px;font-size:12px;color:#8a8070;margin-bottom:16px;padding:10px 14px;background:#faf8f5;border-radius:8px}
.admin-status .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.admin-status .dot.on{background:#22c55e}
.admin-status .dot.off{background:#ef4444}

.app-container{display:flex;min-height:100vh}
.sidebar{width:240px;background:#2d2518;color:#d4c8b0;display:flex;flex-direction:column;justify-content:space-between;position:fixed;top:0;left:0;bottom:0;z-index:10;padding:20px 0}
.sidebar-logo{display:flex;align-items:center;padding:0 20px;margin-bottom:28px}
.logo-mark-sm{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6b5a42,#8b7355);color:#f0e8d8;display:flex;align-items:center;justify-content:center;font-size:16px;font-family:'Noto Serif JP',serif}
.sidebar-title{margin-left:10px;font-size:15px;font-weight:700;color:#f0e8d8;font-family:'Noto Serif JP',serif}
.nav-section{display:flex;flex-direction:column;gap:2px;padding:0 8px}
.nav-item{display:flex;align-items:center;padding:10px 12px;border-radius:8px;color:#bfb49e;font-size:13px;text-align:left;width:100%;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:rgba(255,255,255,.1);color:#f0e8d8}
.nav-item svg{margin-right:10px;flex-shrink:0}
.nav-badge{margin-left:auto;background:#c8956a;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:2px 7px}
.sidebar-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
.user-info{display:flex;align-items:center;color:#bfb49e;font-size:13px;overflow:hidden}
.user-info svg{margin-right:8px;flex-shrink:0}
.user-info-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{color:#8a7a64;padding:6px;border-radius:6px;flex-shrink:0}
.logout-btn:hover{color:#f0e8d8}

.main-content{margin-left:240px;flex:1;min-height:100vh}
.view-container{padding:36px 48px;max-width:860px;margin:0 auto;animation:fadeIn .3s ease}
.view-title{font-size:22px;font-weight:700;color:#2d2518;margin-bottom:6px;font-family:'Noto Serif JP',serif}
.view-desc{font-size:13px;color:#8a8070;margin-bottom:28px}

.write-card{background:#fff;border-radius:14px;padding:28px;border:1px solid #e8e4de}
.info-bar{display:flex;gap:20px;margin-bottom:20px;font-size:13px;color:#8a8070;padding:10px 16px;background:#faf8f5;border-radius:8px;flex-wrap:wrap}
.info-bar strong{color:#5a4832}
.field-label{display:block;font-size:14px;font-weight:600;color:#3d3225;margin-bottom:6px}
.field-hint{font-size:12px;color:#a09888;margin-bottom:12px;line-height:1.6}
.prompt-textarea{width:100%;padding:16px;border:1px solid #e0dcd6;border-radius:10px;font-size:14px;line-height:1.8;resize:vertical;background:#fdfcfa;transition:border-color .2s}
.prompt-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.char-indicator{font-size:12px;color:#a09888}
.generate-btn{display:flex;align-items:center;gap:6px;padding:11px 28px;background:linear-gradient(135deg,#3d3225,#5a4832);color:#fff;border-radius:10px;font-size:14px;font-weight:600;transition:all .2s}
.generate-btn:disabled{opacity:.45;cursor:not-allowed}
.generate-btn:not(:disabled):hover{box-shadow:0 4px 12px rgba(61,50,37,.3)}
.mini-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.error-msg{margin-top:12px;padding:10px 14px;background:#fef2f2;color:#b91c1c;border-radius:8px;font-size:13px}

.result-card{background:#fff;border-radius:14px;padding:28px;border:1px solid #e8e4de}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.result-title{font-size:16px;font-weight:700;color:#2d2518;font-family:'Noto Serif JP',serif;margin-bottom:4px}
.char-badge{font-size:12px;color:#6b5a42;background:#f5f0e8;padding:3px 10px;border-radius:12px;font-weight:600}
.header-actions{display:flex;gap:8px;flex-wrap:wrap}
.icon-btn{background:0 0;border:1px solid #e0dcd6;border-radius:8px;padding:6px 8px;color:#6b5a42;display:flex;align-items:center}
.icon-btn:hover{background:#f5f0e8}
.sm-btn{display:flex;align-items:center;gap:4px;border:1px solid #e0dcd6;border-radius:8px;padding:6px 12px;font-size:12px;color:#6b5a42}
.sm-btn:hover{background:#f5f0e8}
.sm-btn.active{background:#f5f0e8;border-color:#c8b89a}
.title-input{width:100%;padding:10px 14px;border:1px solid #e0dcd6;border-radius:8px;font-size:16px;font-weight:700;font-family:'Noto Serif JP',serif;margin-bottom:10px}
.edit-textarea{width:100%;padding:16px;border:1px solid #e0dcd6;border-radius:10px;font-size:14px;line-height:2;resize:vertical;background:#fdfcfa}
.preview-area{padding:20px 24px;background:#fdfcfa;border-radius:10px;border:1px solid #f0ede8;margin-top:8px;max-height:500px;overflow-y:auto}
.preview-title{font-size:18px;font-weight:700;color:#2d2518;margin-bottom:20px;font-family:'Noto Serif JP',serif}
.preview-p{font-size:14px;line-height:2;color:#3d3225;margin-bottom:16px;white-space:pre-wrap}
.revision-area{margin-top:20px;padding:16px 20px;background:#faf8f5;border-radius:10px}
.revision-row{display:flex;gap:8px;margin-top:8px}
.revision-input{flex:1;padding:9px 14px;border:1px solid #e0dcd6;border-radius:8px;font-size:13px}
.revise-btn{display:flex;align-items:center;gap:5px;padding:9px 16px;background:#6b5a42;color:#fff;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap}
.revise-btn:disabled{opacity:.45;cursor:not-allowed}
.save-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap}
.save-draft-btn{padding:10px 22px;background:#f5f0e8;color:#5a4832;border:1px solid #d8d0c0;border-radius:10px;font-size:13px;font-weight:600}
.save-draft-btn:hover{background:#ebe5d8}
.save-complete-btn{display:flex;align-items:center;gap:6px;padding:10px 24px;background:linear-gradient(135deg,#3d6b35,#4a8040);color:#fff;border-radius:10px;font-size:13px;font-weight:600}
.save-complete-btn:hover{box-shadow:0 4px 12px rgba(61,107,53,.3)}
.cancel-btn{padding:10px 22px;background:#f5f0e8;color:#8a8070;border-radius:8px;font-size:13px}
.back-link{display:flex;align-items:center;gap:4px;color:#8b7355;font-size:13px;padding:8px 0;margin-top:12px}
.back-link:hover{color:#5a4832}

.filter-bar{display:flex;gap:6px;margin-bottom:20px}
.filter-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;background:#f5f0e8;border:1px solid transparent;border-radius:8px;font-size:12px;color:#6b5a42;font-weight:500}
.filter-btn:hover{background:#ebe5d8}
.filter-btn.active{background:#3d3225;color:#f0e8d8}
.filter-count{font-size:10px;background:rgba(0,0,0,.08);border-radius:8px;padding:1px 6px}
.column-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.column-card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid #e8e4de;cursor:pointer;transition:all .2s}
.column-card:hover{border-color:#c8b89a;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.status-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.status-complete{background:#ecfdf5;color:#065f46}
.status-draft{background:#fef9e7;color:#92400e}
.card-title{font-size:15px;font-weight:700;color:#2d2518;margin-bottom:6px;font-family:'Noto Serif JP',serif;line-height:1.4}
.card-excerpt{font-size:12px;color:#8a8070;line-height:1.6;margin-bottom:10px}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.card-chars{font-size:12px;color:#999}
.delete-btn{color:#c4a882;padding:4px;border-radius:4px;display:flex}
.delete-btn:hover{color:#b91c1c}
.complete-sm-btn{display:flex;align-items:center;gap:4px;background:#3d6b35;border-radius:8px;padding:6px 14px;font-size:12px;color:#fff;font-weight:600}
.empty-state{text-align:center;padding:48px 20px;color:#8a8070;font-size:14px}
.empty-hint{font-size:13px;color:#aaa;margin-top:6px}

.upload-area{padding:28px 24px;background:#fff;border-radius:12px;border:2px dashed #d0c8b8;margin-bottom:16px;text-align:center;transition:all .2s}
.upload-area.drag-over{border-color:#8b7355;background:#f5f0e8}
.upload-btns{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
.upload-btn{display:flex;align-items:center;gap:6px;padding:10px 20px;background:#3d3225;color:#f0e8d8;border-radius:10px;font-size:13px;font-weight:600}
.upload-btn:hover{background:#5a4832}
.upload-hint{font-size:12px;color:#999}
.upload-drag-hint{font-size:12px;color:#b0a898;margin-top:4px}
.upload-status{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px}
.upload-status.processing{background:#fef9e7;color:#92400e}
.upload-status.success{background:#ecfdf5;color:#065f46}
.upload-status.error{background:#fef2f2;color:#b91c1c}
.upload-divider{margin:0 8px;color:#ccc}
.manual-btn{padding:10px 20px;background:#f5f0e8;color:#5a4832;border:1px solid #d8d0c0;border-radius:10px;font-size:13px;font-weight:500}
.manual-btn:hover{background:#ebe5d8}
.manual-area{margin-bottom:16px;padding:20px;background:#fff;border-radius:12px;border:1px solid #e8e4de}
.section-title{font-size:14px;font-weight:600;color:#5a4832;margin-bottom:12px;letter-spacing:.03em}
.past-list{display:flex;flex-direction:column;gap:8px}
.past-card{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#fff;border-radius:10px;border:1px solid #e8e4de}
.past-card-info{flex:1;min-width:0}
.past-card-title{font-size:14px;font-weight:600;color:#2d2518;margin-bottom:4px}
.past-card-excerpt{font-size:12px;color:#8a8070;margin-bottom:4px;line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.past-card-meta{font-size:11px;color:#aaa}

.rule-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0ede8;font-size:14px;line-height:1.6}
.rule-dot{color:#c8956a;font-size:8px;margin-top:6px;flex-shrink:0}
.rule-dot-custom{color:#8b7355}
.rule-text{flex:1}
.rule-add-row{display:flex;gap:8px;margin-top:16px}
.rule-input{flex:1;padding:10px 14px;border:1px solid #e0dcd6;border-radius:8px;font-size:13px}
.add-rule-btn{padding:10px 22px;background:#3d3225;color:#f0e8d8;border-radius:8px;font-size:13px;font-weight:600}

@media(max-width:768px){
  .sidebar{width:56px;padding:12px 0}
  .sidebar-logo{padding:0 12px;justify-content:center}
  .sidebar-title,.nav-item span,.user-info-name,.nav-badge{display:none}
  .nav-item{justify-content:center;padding:10px}
  .nav-item svg{margin-right:0}
  .sidebar-footer{flex-direction:column;gap:8px;padding:8px}
  .main-content{margin-left:56px}
  .view-container{padding:20px 16px}
  .column-grid{grid-template-columns:1fr}
}
</style>
</head>

// ─── WordPress HTML conversion ───
function contentToWpHtml(title,content,signature){
  const lines=content.split('\n');
  let html='';
  let currentParagraph='';
  const headings=[];

  function flushParagraph(){
    if(currentParagraph.trim()){
      html+=`<p>${currentParagraph.trim()}</p>\n`;
      currentParagraph='';
    }
  }

  for(const line of lines){
    const headingMatch=line.match(/^##\s+(.+)/);
    if(headingMatch){
      flushParagraph();
      const headingText=headingMatch[1].trim();
      headings.push(headingText);
      html+=`<h2>${headingText}</h2>\n`;
    }else if(line.trim()===''){
      flushParagraph();
    }else{
      if(currentParagraph)currentParagraph+='\n';
      currentParagraph+=line;
    }
  }
  flushParagraph();

  // Add signature
  if(signature){
    html+=`\n<p>${signature}</p>\n`;
  }

  return html;
}

function contentToPreviewHtml(title,content,signature){
  const lines=content.split('\n');
  let html=`<h1 style="font-size:22px;font-weight:700;color:#2d2518;font-family:'Noto Serif JP',serif;margin-bottom:24px;line-height:1.5">${esc(title)}</h1>`;

  // Build TOC
  const headings=[];
  for(const line of lines){
    const m=line.match(/^##\s+(.+)/);
    if(m)headings.push(m[1].trim());
  }
  if(headings.length>0){
    html+=`<ul style="list-style:disc;padding-left:20px;margin-bottom:24px;font-size:14px;color:#5a4832">`;
    headings.forEach(h=>{html+=`<li style="margin-bottom:4px">${esc(h)}</li>`;});
    html+=`</ul>`;
  }

  // Build body
  let currentP='';
  function flush(){if(currentP.trim()){html+=`<p style="font-size:14px;line-height:2;color:#3d3225;margin-bottom:16px">${esc(currentP.trim())}</p>`;currentP='';}}
  for(const line of lines){
    const hm=line.match(/^##\s+(.+)/);
    if(hm){flush();html+=`<h2 style="font-size:17px;font-weight:700;color:#2d2518;margin:28px 0 12px;font-family:'Noto Serif JP',serif">${esc(hm[1].trim())}</h2>`;}
    else if(line.trim()===''){flush();}
    else{if(currentP)currentP+='\n';currentP+=line;}
  }
  flush();
  if(signature){html+=`<p style="font-size:14px;color:#5a4832;margin-top:28px;font-weight:500">${esc(signature)}</p>`;}
  return html;
}
// ─── AI ───
async function generateColumnAI(prompt,pastCols,rules,draft,feedback){
  if(!apiKey)throw new Error('APIキーが設定されていません。管理者に連絡してください。');
  const rulesText=[...DEFAULT_RULES,...rules].map(r=>`・${r.text}`).join('\n');
  const pastSamples=(pastCols||[]).slice(0,5).map((c,i)=>`【過去コラム${i+1}】\nタイトル: ${c.title}\n${c.content}`).join('\n\n---\n\n');
  const sys=`あなたは、過去のコラムの文体・論調・思考パターンを完璧に模倣するゴーストライターです。\n以下のルールを厳守してコラムを執筆してください：\n\n【執筆ルール】\n${rulesText}\n\n【重要な制約】\n- 必ず1,500〜3,000字（空白除く）で書くこと\n- セクション数は3〜5つで、各セクションに見出しを付けること\n- 各セクションの文字数をおおよそ均等にすること\n- 過去コラムの文体・口調・表現の癖を徹底的に真似ること\n- そのまま公開できる品質に仕上げること\n- タイトルも付けること\n\n【出力フォーマット】\n以下の形式で出力。セクション見出しは ## で始めること：\nTITLE: （タイトル）\n---\n## セクション見出し1\n（本文段落。段落間は空行1つ。）\n\n## セクション見出し2\n（本文段落）\n\n## セクション見出し3\n（本文段落）`;
  let msg;
  if(draft&&feedback){msg=`以下のコラム草稿を修正してください。\n\n【修正指示】\n${feedback}\n\n【現在の草稿】\n${draft}${pastSamples?'\n\n【参考：過去のコラム】\n'+pastSamples:''}`;}
  else{msg=`以下の内容・メモをもとにコラムを執筆してください。\n\n【書きたい内容・メモ】\n${prompt}${pastSamples?'\n\n【参考：過去のコラム】\n'+pastSamples:''}`;}
  const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4096,system:sys,messages:[{role:'user',content:msg}]})});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`APIエラー (${resp.status})`);}
  const data=await resp.json();const text=(data.content||[]).map(b=>b.text||'').join('');
  const tm=text.match(/TITLE:\s*(.+)/);const title=tm?tm[1].trim():'無題のコラム';const body=text.replace(/TITLE:\s*.+\n-{2,}\n?/,'').trim();
  return{title,content:body,charCount:cc(body)};
}

window.searchAndSelectUser=function(){
  const name=($('#login-name-search')?.value||'').trim();

};

};
window.doPasswordLogin=async function(){
  const pw=($('#login-pw')?.value||'');
  if(!loginTarget)return;
  if(pw!==(loginTarget.password||'')){
    $('#login-error').innerHTML='<div class="login-error">パスワードが違います</div>';return;
  }
  state.currentUser=loginTarget;localStorage.setItem('cw-uid',loginTarget.id);

  await loadApiKey();await loadUserData();render();
};
window.doCreateUser=async function(){
  const name=($('#login-name')?.value||'').trim();
  const title=($('#login-title-input')?.value||'').trim();

  const pw2=($('#login-newpw2')?.value||'');

  if(pw1!==pw2){$('#login-error').innerHTML='<div class="login-error">パスワードが一致しません</div>';return;}
  try{

    u.title=title;state.currentUser=u;localStorage.setItem('cw-uid',u.id);
    loginStep='select';loginTarget=null;
    await loadApiKey();await loadUserData();render();
  }catch(e){$('#login-error').innerHTML=`<div class="login-error">${esc(e.message)}</div>`;}
};

function setupUploadListeners(){
  const fi=document.getElementById('fi');
  const btn=document.getElementById('upload-btn-trigger');
  const zone=document.getElementById('drop-zone');
  if(!fi||!btn||!zone)return;
  btn.addEventListener('click',()=>fi.click());
  fi.addEventListener('change',()=>{if(fi.files?.length)processFiles(fi.files);fi.value='';});
  zone.addEventListener('dragover',(e)=>{e.preventDefault();e.stopPropagation();zone.classList.add('drag-over');});
  zone.addEventListener('dragleave',(e)=>{e.preventDefault();e.stopPropagation();zone.classList.remove('drag-over');});
  zone.addEventListener('drop',(e)=>{e.preventDefault();e.stopPropagation();zone.classList.remove('drag-over');if(e.dataTransfer?.files?.length)processFiles(e.dataTransfer.files);});
}

function showUploadStatus(msg,type){
  const el=document.getElementById('upload-status');
  if(el)el.innerHTML=msg?`<div class="upload-status ${type}">${msg}</div>`:'';
}

async function extractTextFromFile(file){
  const name=file.name.toLowerCase();
  if(name.endsWith('.docx')){
    const buf=await file.arrayBuffer();
    const result=await mammoth.extractRawText({arrayBuffer:buf});
    return result.value||'';
  }
  if(name.endsWith('.pdf')){
    const buf=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buf}).promise;
    let text='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(item=>item.str).join('')+'\n';
    }
    return text;
  }
  // .txt, .md, etc
  return await file.text();
}

async function processFiles(files){
  showUploadStatus('アップロード中... (0/'+files.length+')','processing');
  let ok=0;
  for(let i=0;i<files.length;i++){
    const file=files[i];
    showUploadStatus(`処理中: ${file.name} (${i+1}/${files.length})`,'processing');
    try{
      const text=await extractTextFromFile(file);
      if(text.trim()){
        const title=file.name.replace(/\.[^/.]+$/,'');
        await dbAddPastColumn(state.currentUser.id,title,text.trim());
        ok++;
      }else{
        showUploadStatus(`${file.name}: テキストを抽出できませんでした`,'error');
        await new Promise(r=>setTimeout(r,2000));
      }
    }catch(e){
      console.error(e);
      showUploadStatus(`${file.name}: エラー - ${e.message}`,'error');
      await new Promise(r=>setTimeout(r,2000));
    }
  }
  state.pastColumns=await dbLoadPastColumns(state.currentUser.id);
  if(ok>0)showUploadStatus(`${ok}件のコラムをアップロードしました`,'success');
  renderView();
}

    $('#prof-msg').innerHTML='<div class="admin-msg ok" style="margin-top:12px">✓ 保存しました</div>';
  }catch(e){$('#prof-msg').innerHTML=`<div class="admin-msg err" style="margin-top:12px">${esc(e.message)}</div>`;}
};
window.changeUserPw=async function(){
  const cur=($('#prof-curpw')?.value||'');
  const pw1=($('#prof-newpw')?.value||'');
  const pw2=($('#prof-newpw2')?.value||'');
  if(cur!==(state.currentUser.password||'')){$('#pw-change-msg').innerHTML='<div class="admin-msg err" style="margin-top:10px">現在のパスワードが違います</div>';return;}
  if(!pw1){$('#pw-change-msg').innerHTML='<div class="admin-msg err" style="margin-top:10px">新しいパスワードを入力してください</div>';return;}
  if(pw1!==pw2){$('#pw-change-msg').innerHTML='<div class="admin-msg err" style="margin-top:10px">新しいパスワードが一致しません</div>';return;}
  try{
    await db.from('users').update({password:pw1}).eq('id',state.currentUser.id);
    state.currentUser.password=pw1;
    $('#pw-change-msg').innerHTML='<div class="admin-msg ok" style="margin-top:10px">✓ パスワードを変更しました</div>';

  }catch(e){$('#pw-change-msg').innerHTML=`<div class="admin-msg err" style="margin-top:10px">${esc(e.message)}</div>`;}
};

// ─── Docx Download ───
async function downloadDocx(title,content,signature){
  const {Document,Packer,Paragraph,TextRun,AlignmentType}=window.docx;
  const font='Meiryo UI';
  const sz=21; // 10.5pt in half-points
  const children=[];
  const emptyP=()=>new Paragraph({children:[new TextRun({text:'',font:{name:font},size:sz})]});

  // Title
  children.push(new Paragraph({children:[new TextRun({text:title,font:{name:font},size:sz})]}));
  children.push(emptyP());

  // Body
  const lines=content.split('\n');
  const blocks=[];
  let cur=null;
  for(const line of lines){
    const hm=line.match(/^##\s+(.+)/);
    if(hm){
      if(cur)blocks.push(cur);
      cur={heading:hm[1].trim(),paras:[]};
    }else if(line.trim()!==''){
      if(!cur)cur={heading:null,paras:[]};
      cur.paras.push(line);
    }
  }
  if(cur)blocks.push(cur);

  blocks.forEach((block,bi)=>{
    // Extra empty line before sections (except first)
    if(bi>0)children.push(emptyP());
    // Section heading (bold)
    if(block.heading){
      children.push(new Paragraph({children:[new TextRun({text:block.heading,font:{name:font},size:sz,bold:true})]}));
      children.push(emptyP());
    }
    // Paragraphs
    block.paras.forEach((p,pi)=>{
      children.push(new Paragraph({children:[new TextRun({text:p,font:{name:font},size:sz})]}));
      if(pi<block.paras.length-1)children.push(emptyP());
    });
  });

  // Signature (right-aligned)
  if(signature){
    children.push(emptyP());
    children.push(new Paragraph({children:[new TextRun({text:signature,font:{name:font},size:sz})],alignment:AlignmentType.RIGHT}));
  }

  // 457200 EMU = 720 twips = 0.5 inch ≈ 1.27cm margins
  const doc=new Document({sections:[{properties:{page:{margin:{top:720,right:720,bottom:720,left:720}}},children}]});
  const blob=await Packer.toBlob(doc);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=(title||'コラム')+'.docx';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
